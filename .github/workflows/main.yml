name: Build and Release

on:
  push:
    tags:
      - "*.*.*"
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  quality:
    name: Quality Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"

      - name: Install dependencies
        run: npm install

      - name: Lint
        run: npm run lint

      - name: Tests
        run: npm test

  build:
    name: Translate, Build and Release
    runs-on: ubuntu-latest
    needs: quality

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Sync manifest.json version with tag
        run: |
          TAG="${{ github.ref_name }}"
          CURRENT=$(jq -r '.version' manifest.json)
          if [ "$CURRENT" != "$TAG" ]; then
            echo "Updating manifest.json: $CURRENT → $TAG"
            jq --arg v "$TAG" '.version = $v' manifest.json > manifest.tmp && mv manifest.tmp manifest.json
          else
            echo "manifest.json already at $TAG"
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache Ollama model
        uses: actions/cache@v4
        with:
          path: ~/.ollama/models
          key: ollama-translategemma-latest

      - name: Cache Python dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ hashFiles('AI translate/requirements.txt') }}

      - name: Install Ollama
        run: curl -fsSL https://ollama.com/install.sh | sh

      - name: Start Ollama and pull model
        run: |
          ollama serve &
          echo "Waiting for Ollama to start..."
          until curl -s http://localhost:11434/api/tags > /dev/null; do sleep 2; done
          echo "Ollama ready, pulling model..."
          ollama pull translategemma:latest

      - name: Install Python dependencies
        run: pip install -r "AI translate/requirements.txt"

      - name: Run AI Translation
        run: |
          cd "AI translate"
          python translate.py --merge

      - name: Commit manifest, versions and translations to main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add manifest.json app/i18n/locales/
          git diff --staged --quiet && echo "Nothing to commit" || (
            git commit -m "chore: release ${{ github.ref_name }} — sync manifest and translations"
            git push origin HEAD:main
          )

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"

      - name: Install dependencies
        run: npm install

      - name: Build project
        run: npm run build

      - name: Check bundle size
        run: |
          SIZE=$(wc -c < main.js)
          SIZE_MB=$(echo "scale=2; $SIZE / 1048576" | bc)
          LIMIT=2097152
          echo "Bundle size: ${SIZE_MB} MB"
          if [ "$SIZE" -gt "$LIMIT" ]; then
            echo "❌ Bundle size ${SIZE_MB} MB exceeds 2 MB limit"
            exit 1
          fi
          echo "✅ Bundle size OK (${SIZE_MB} MB)"

      - name: Create release files
        run: |
          mkdir -p release
          cp main.js release/
          cp styles.css release/
          cp manifest.json release/

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            release/main.js
            release/styles.css
            release/manifest.json
          generate_release_notes: true
          draft: false
          fail_on_unmatched: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
